name: Daily Server Report

on:
  schedule:
    - cron: '0 13 * * *' # 8 AM EST (13:00 UTC)
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Comprehensive server audit via SSH
        uses: appleboy/ssh-action@v1
        id: audit
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            export PATH=/opt/orbstack/bin:/usr/local/bin:/opt/homebrew/bin:$PATH

            echo "===OVERVIEW==="
            echo "hostname=$(hostname)"
            echo "date=$(date)"
            echo "uptime=$(uptime)"

            echo "===DISK_DETAIL==="
            df -h /System/Volumes/Data 2>/dev/null || df -h /
            echo "---"
            # Top 10 largest directories in home
            du -sh ~/Documents ~/Downloads ~/Library ~/Pictures ~/Movies ~/*.git ~/coral_moneymanager ~/smithbuilder ~/projectmanager ~/openrouterlogviewer ~/project-coach 2>/dev/null | sort -rh | head -10

            echo "===DOCKER_DETAIL==="
            echo "--- system df ---"
            docker system df 2>/dev/null
            echo "--- containers ---"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Size}}" 2>/dev/null
            echo "--- images ---"
            docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" 2>/dev/null | head -15
            echo "--- volumes ---"
            docker system df -v 2>/dev/null | grep -A 100 "VOLUME NAME" | head -15

            echo "===MEMORY_DETAIL==="
            # macOS memory pressure
            memory_pressure 2>/dev/null || vm_stat 2>/dev/null || free -h 2>/dev/null

            echo "===ALL_SERVICES==="
            echo "--- HTTP Health Checks ---"
            for port_name in "3000:OpenRouter Log Viewer" "3001:Mission Control" "3002:Project Manager" "3003:Homebase" "3004:Project Coach" "3005:Coral Money Manager" "3010:SmithBuilder" "8000:MC Backend" "9001:Penpot"; do
              port="${port_name%%:*}"
              name="${port_name##*:}"
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://localhost:$port" 2>/dev/null || echo "000")
              echo "${name}|${port}|${code}"
            done

            echo "--- LaunchAgents ---"
            launchctl list 2>/dev/null | grep -E "openclaw|ollama|openrouter|homebase" || echo "none"

            echo "--- Ollama ---"
            curl -s --max-time 5 http://127.0.0.1:11434/api/tags 2>/dev/null | python3 -c "
            import sys, json
            try:
              d = json.load(sys.stdin)
              for m in d.get('models', []):
                print(f\"  {m['name']}: {m.get('size', 'unknown')} bytes\")
            except: print('  Parse error')
            " 2>/dev/null || echo "  Not responding"

            echo "===CLEANUP_OPPORTUNITIES==="
            echo "Docker reclaimable:"
            docker system df 2>/dev/null | grep -E "reclaimable" || echo "  unknown"
            echo "Dangling images:"
            docker images -f "dangling=true" -q 2>/dev/null | wc -l | xargs echo " "
            echo "Stopped containers:"
            docker ps -a --filter "status=exited" -q 2>/dev/null | wc -l | xargs echo " "

      - name: Send daily report to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_MONITORING }}
          RAW_OUTPUT: ${{ steps.audit.outputs.stdout }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d")

          # Extract disk info
          DISK_LINE=$(echo "$RAW_OUTPUT" | sed -n '/===DISK_DETAIL===/,/===DOCKER_DETAIL===/p' | grep -v '===' | head -2 | tail -1)
          DISK_PCT=$(echo "$DISK_LINE" | awk '{print $5}' | tr -d '%' 2>/dev/null)

          # Extract service health
          SERVICE_STATUS=""
          while IFS='|' read -r name port code; do
            [ -z "$name" ] && continue
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              SERVICE_STATUS="${SERVICE_STATUS}:green_circle: ${name} (:${port})\\n"
            else
              SERVICE_STATUS="${SERVICE_STATUS}:red_circle: ${name} (:${port}) — HTTP ${code}\\n"
            fi
          done <<< "$(echo "$RAW_OUTPUT" | sed -n '/--- HTTP Health Checks ---/,/--- LaunchAgents ---/p' | grep '|')"

          # Extract Docker summary
          DOCKER_SUMMARY=$(echo "$RAW_OUTPUT" | sed -n '/--- system df ---/,/--- containers ---/p' | grep -v '---' | head -5)

          # Extract cleanup opportunities
          CLEANUP=$(echo "$RAW_OUTPUT" | sed -n '/===CLEANUP_OPPORTUNITIES===/,//p' | grep -v '===' | head -6)

          # Determine color
          COLOR=3066993
          if [ -n "$DISK_PCT" ] && [ "$DISK_PCT" -gt 90 ] 2>/dev/null; then
            COLOR=15158332
          elif [ -n "$DISK_PCT" ] && [ "$DISK_PCT" -gt 80 ] 2>/dev/null; then
            COLOR=15844367
          fi

          PAYLOAD=$(cat <<ENDJSON
          {
            "username": "Mac Mini Monitor",
            "embeds": [{
              "title": ":clipboard: Daily Server Report — ${TIMESTAMP}",
              "color": ${COLOR},
              "fields": [
                {"name": ":floppy_disk: Disk Usage", "value": "${DISK_LINE:-unknown}", "inline": false},
                {"name": ":globe_with_meridians: Services", "value": "$(echo -e "${SERVICE_STATUS:-No services checked}")", "inline": false},
                {"name": ":whale: Docker", "value": "$(echo "$DOCKER_SUMMARY" | tr '\n' ' ' | head -c 200)", "inline": false},
                {"name": ":broom: Cleanup Opportunities", "value": "$(echo -e "$CLEANUP" | head -c 200)", "inline": false}
              ],
              "footer": {"text": "Daily report — run /docker-cleanup to reclaim space"},
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
            }]
          }
          ENDJSON
          )

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
