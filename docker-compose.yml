# Docker Compose for Mac Mini Monitor Bot
# Deploy on the Mac Mini alongside other services
#
# Setup:
# 1. Copy .env.example to .env and fill in values
# 2. Register commands: docker compose run --rm bot node register-commands.js
# 3. Start: docker compose up -d

services:
  bot:
    build: ./bot
    container_name: monitor-bot
    restart: unless-stopped
    env_file: .env
    # Mount Docker socket so the bot can inspect containers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Grant access to host network for service health checks
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
