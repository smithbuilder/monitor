name: Server Health Digest

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.MAC_MINI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Collect metrics and send digest
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_MONITORING }}
          MAC_HOST: ${{ secrets.MAC_MINI_HOST }}
          MAC_USER: ${{ secrets.MAC_MINI_USER }}
        shell: bash
        run: |
          export PATH="/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:$PATH"

          RAW=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "${MAC_USER}@${MAC_HOST}" 'bash -s' <<'REMOTESCRIPT'
          export PATH=/opt/orbstack/bin:/usr/local/bin:/opt/homebrew/bin:$PATH

          echo "HOSTNAME=$(hostname)"
          echo "UPTIME=$(uptime | sed "s/.*up /up /" | cut -d"," -f1-2)"

          DISK_LINE=$(df -h /System/Volumes/Data 2>/dev/null | tail -1)
          echo "DISK_USED=$(echo "$DISK_LINE" | awk '{print $3}')"
          echo "DISK_TOTAL=$(echo "$DISK_LINE" | awk '{print $2}')"
          echo "DISK_PCT=$(echo "$DISK_LINE" | awk '{print $5}')"
          echo "DISK_FREE=$(echo "$DISK_LINE" | awk '{print $4}')"

          echo "DOCKER_RUNNING=$(docker ps -q 2>/dev/null | wc -l | xargs)"
          echo "DOCKER_TOTAL=$(docker ps -aq 2>/dev/null | wc -l | xargs)"

          echo "CONTAINERS_START"
          docker ps --format "{{.Names}}|{{.Status}}" 2>/dev/null
          echo "CONTAINERS_END"

          OLLAMA_OK=$(curl -s --max-time 3 http://127.0.0.1:11434/api/tags 2>/dev/null | head -c 1)
          [ "$OLLAMA_OK" = "{" ] && echo "OLLAMA=Running" || echo "OLLAMA=Not responding"

          echo "SERVICES_START"
          for pn in "3000:LogViewer" "3001:MissionCtrl" "3002:ProjMgr" "3003:Homebase" "3004:Coach" "3005:Coral" "3010:SmithBuilder" "8000:MCBackend" "9001:Penpot"; do
            p="${pn%%:*}"; n="${pn##*:}"
            c=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://localhost:$p" 2>/dev/null || echo "000")
            echo "${n}|${p}|${c}"
          done
          echo "SERVICES_END"
          REMOTESCRIPT
          )

          echo "--- RAW OUTPUT ---"
          echo "$RAW"
          echo "--- END RAW ---"

          NOW_ISO="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"

          HOSTNAME="$(echo "$RAW" | grep '^HOSTNAME=' | cut -d= -f2-)"
          UPTIME_INFO="$(echo "$RAW" | grep '^UPTIME=' | cut -d= -f2-)"
          DISK_PCT="$(echo "$RAW" | grep '^DISK_PCT=' | cut -d= -f2- | tr -d '%')"
          DISK_FREE="$(echo "$RAW" | grep '^DISK_FREE=' | cut -d= -f2-)"
          DISK_USED="$(echo "$RAW" | grep '^DISK_USED=' | cut -d= -f2-)"
          DISK_TOTAL="$(echo "$RAW" | grep '^DISK_TOTAL=' | cut -d= -f2-)"
          DOCKER_RUNNING="$(echo "$RAW" | grep '^DOCKER_RUNNING=' | cut -d= -f2-)"
          DOCKER_TOTAL="$(echo "$RAW" | grep '^DOCKER_TOTAL=' | cut -d= -f2-)"
          OLLAMA="$(echo "$RAW" | grep '^OLLAMA=' | cut -d= -f2-)"

          # Container list
          CLIST=""
          while IFS='|' read -r name status; do
            [ -z "$name" ] && continue
            if echo "$status" | grep -qi "up"; then
              CLIST="${CLIST}:green_circle: ${name}\\n"
            else
              CLIST="${CLIST}:red_circle: ${name}\\n"
            fi
          done <<< "$(echo "$RAW" | sed -n '/CONTAINERS_START/,/CONTAINERS_END/p' | grep '|')"

          # Service list
          SLIST=""
          SVC_DOWN=0
          while IFS='|' read -r name port code; do
            [ -z "$name" ] && continue
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              SLIST="${SLIST}:green_circle: ${name} :${port}\\n"
            else
              SLIST="${SLIST}:red_circle: ${name} :${port} (${code})\\n"
              SVC_DOWN=$((SVC_DOWN + 1))
            fi
          done <<< "$(echo "$RAW" | sed -n '/SERVICES_START/,/SERVICES_END/p' | grep '|')"

          # Color
          COLOR=3066993
          TITLE="Server Health: OK"
          if [ -n "$DISK_PCT" ] && [ "$DISK_PCT" -gt 90 ] 2>/dev/null; then
            COLOR=15158332; TITLE="Server Health: CRITICAL"
          elif [ -n "$DISK_PCT" ] && [ "$DISK_PCT" -gt 80 ] 2>/dev/null; then
            COLOR=15844367; TITLE="Server Health: WARNING"
          fi
          [ "$SVC_DOWN" -gt 0 ] && [ "$COLOR" = "3066993" ] && COLOR=15844367 && TITLE="Server Health: WARNING"

          DISK_STR="${DISK_USED}/${DISK_TOTAL} (${DISK_PCT}%) - ${DISK_FREE} free"
          CLIST_ESC="$(echo -e "$CLIST" | head -c 500)"
          SLIST_ESC="$(echo -e "$SLIST" | head -c 500)"

          PAYLOAD="{\"username\":\"Mac Mini Monitor\",\"embeds\":[{\"title\":\"${TITLE}\",\"color\":${COLOR},\"fields\":[{\"name\":\"Host\",\"value\":\"${HOSTNAME}\",\"inline\":true},{\"name\":\"Uptime\",\"value\":\"${UPTIME_INFO}\",\"inline\":true},{\"name\":\"Disk\",\"value\":\"${DISK_STR}\",\"inline\":false},{\"name\":\"Docker\",\"value\":\"${DOCKER_RUNNING}/${DOCKER_TOTAL} running\",\"inline\":true},{\"name\":\"Ollama\",\"value\":\"${OLLAMA}\",\"inline\":true},{\"name\":\"Containers\",\"value\":\"${CLIST_ESC}\",\"inline\":false},{\"name\":\"Services\",\"value\":\"${SLIST_ESC}\",\"inline\":false}],\"timestamp\":\"${NOW_ISO}\"}]}"

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
          echo ""
          echo "Digest sent."
