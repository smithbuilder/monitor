title = "monitor secret scanning"

[extend]
useDefault = true

[allowlist]
description = "Files and paths that legitimately contain secret-shaped strings (examples, templates, test fixtures)"
paths = [
    '''\\.env\\.example''',
    '''docs/.*example''',
    '''README\\.md''',
]
regexTarget = "match"
regexes = [
    '''(?i)your[-_]?api[-_]?key''',
    '''(?i)placeholder''',
    '''(?i)<your.*>''',
    '''\\$\\{[A-Z_]+\\}''',
    '''pbk_\\.\\.\\.''',
    '''(?i)(gateway|your|api|auth|bearer)[_-]?token''',
    '''pbk_(invalid|placeholder|example|test|demo|foo|bar|baz)''',
    '''sk_[a-z]+_\\.\\.\\.''',
]
