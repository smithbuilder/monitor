name: Uptime Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Check all service endpoints
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_MONITORING }}
          MAC_MINI_IP: ${{ secrets.MAC_MINI_HOST }}
        shell: bash
        run: |
          export PATH="/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:$PATH"
          REPORT=""
          ALL_OK=true
          TIMESTAMP="$(date -u +'%Y-%m-%d %H:%M UTC')"
          NOW_ISO="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"

          check_service() {
            local NAME="$1" PORT="$2" URLPATH="$3" EXPECTED="$4"
            local URL="http://${MAC_MINI_IP}:${PORT}${URLPATH}"
            local HTTP_CODE
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")

            local IS_OK=false
            IFS=',' read -ra CODES <<< "$EXPECTED"
            for C in "${CODES[@]}"; do
              [ "$HTTP_CODE" = "$C" ] && IS_OK=true && break
            done

            if [ "$IS_OK" = true ]; then
              REPORT="${REPORT}\\n:white_check_mark: **${NAME}** (:${PORT}): HTTP ${HTTP_CODE}"
            else
              ALL_OK=false
              REPORT="${REPORT}\\n:red_circle: **${NAME}** (:${PORT}): HTTP ${HTTP_CODE}"
            fi
          }

          check_service "OpenRouter Log Viewer" 3000 "/" "200,307"
          check_service "Mission Control" 3001 "/" "200"
          check_service "Project Manager" 3002 "/api/health" "200"
          check_service "Homebase" 3003 "/api/health" "200"
          check_service "Project Coach" 3004 "/" "200"
          check_service "Coral Money Manager" 3005 "/api/health" "200"
          check_service "SmithBuilder" 3010 "/" "200"
          check_service "MC Backend" 8000 "/docs" "200"
          check_service "Penpot" 9001 "/" "200,302"

          if [ "$ALL_OK" = true ]; then
            COLOR=3066993
            TITLE="All Services Operational"
          else
            COLOR=15158332
            TITLE="ALERT: Service(s) Down"
          fi

          DESC="$(echo -e "$REPORT")"
          # Escape for JSON
          DESC="${DESC//\"/\\\"}"
          DESC="${DESC//$'\n'/\\n}"

          PAYLOAD="{\"username\":\"Mac Mini Monitor\",\"embeds\":[{\"title\":\"${TITLE}\",\"description\":\"${DESC}\",\"color\":${COLOR},\"footer\":{\"text\":\"Uptime check at ${TIMESTAMP}\"},\"timestamp\":\"${NOW_ISO}\"}]}"

          MINUTE="$(date -u +'%M')"
          if [ "$ALL_OK" = false ]; then
            echo "Services down - sending alert"
            curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
          elif [ "$MINUTE" = "00" ]; then
            echo "Hourly all-clear"
            curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
          else
            echo "All OK, skipping (not top of hour)"
          fi
